events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Rate limiting zone for API
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # Common proxy headers (used in all proxy_pass blocks)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────────────
    server {
        listen 80;
        server_name api.anyserver.site admin.anyserver.site register.anyserver.site;

        # Let certbot answer ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: API (api.anyserver.site → server:3000) ─────────────────────────
    server {
        listen 443 ssl;
        server_name api.anyserver.site;

        ssl_certificate     /etc/letsencrypt/live/api.anyserver.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.anyserver.site/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           DENY always;

        location / {
            proxy_pass         http://server:3000;
            proxy_read_timeout 300s;
            limit_req          zone=api burst=40 nodelay;
        }
    }

    # ── HTTPS: Admin SPA (admin.anyserver.site → admin:80) ───────────────────
    server {
        listen 443 ssl;
        server_name admin.anyserver.site;

        ssl_certificate     /etc/letsencrypt/live/admin.anyserver.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.anyserver.site/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           SAMEORIGIN always;

        location / {
            proxy_pass http://admin:80;
        }
    }

    # ── HTTPS: Register SPA (register.anyserver.site → register:80) ──────────
    server {
        listen 443 ssl;
        server_name register.anyserver.site;

        ssl_certificate     /etc/letsencrypt/live/register.anyserver.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/register.anyserver.site/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           SAMEORIGIN always;

        location / {
            proxy_pass http://register:80;
        }
    }
}
