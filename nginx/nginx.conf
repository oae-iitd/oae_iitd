events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Rate limiting zone for API
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # Docker's internal DNS — resolves service names at request time, not startup
    resolver 127.0.0.11 valid=30s ipv6=off;

    # SSL settings inlined — no external files needed
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    # ── HTTP: ACME challenge + redirect to HTTPS ─────────────────────────────
    server {
        listen 80;
        server_name api.anyserver.site admin.anyserver.site register.anyserver.site;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: API ────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.anyserver.site;

        ssl_certificate     /etc/letsencrypt/live/api.anyserver.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.anyserver.site/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           DENY always;

        location / {
            proxy_pass         http://server:3000;
            proxy_read_timeout 300s;
            limit_req          zone=api burst=40 nodelay;
        }
    }

    # ── HTTPS: Admin SPA ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name admin.anyserver.site;

        ssl_certificate     /etc/letsencrypt/live/admin.anyserver.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.anyserver.site/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           SAMEORIGIN always;

        location / {
            proxy_pass http://admin:80;
        }
    }

    # ── HTTPS: Register SPA ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name register.anyserver.site;

        ssl_certificate     /etc/letsencrypt/live/register.anyserver.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/register.anyserver.site/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           SAMEORIGIN always;

        location / {
            proxy_pass http://register:80;
        }
    }
}
