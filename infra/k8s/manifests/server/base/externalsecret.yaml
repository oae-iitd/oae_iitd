# Pulls secrets from AWS Secrets Manager into a Kubernetes Secret.
# Requires External Secrets Operator + a ClusterSecretStore named "aws-secretsmanager".
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oae-server-secrets
  namespace: oae
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: oae-server-secrets
    creationPolicy: Owner
  data:
    # --- Database ---
    - secretKey: DATABASE_URL
      remoteRef:
        key: oae/production/db
        property: DATABASE_URL
    # --- Redis ---
    - secretKey: REDIS_URL
      remoteRef:
        key: oae/production/redis
        property: REDIS_URL
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: oae/production/redis
        property: REDIS_PASSWORD
    # --- App secrets (stored manually or by CI) ---
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: oae/production/app
        property: SMTP_PASSWORD
    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef:
        key: oae/production/app
        property: TWILIO_ACCOUNT_SID
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: oae/production/app
        property: TWILIO_AUTH_TOKEN
    - secretKey: TWILIO_PHONE_NUMBER
      remoteRef:
        key: oae/production/app
        property: TWILIO_PHONE_NUMBER
