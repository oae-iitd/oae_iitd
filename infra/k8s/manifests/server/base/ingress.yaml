apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oae-server
  namespace: oae
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # Set your ACM certificate ARN in the overlay
    alb.ingress.kubernetes.io/certificate-arn: REPLACE_WITH_ACM_CERTIFICATE_ARN
    # All 3 apps (server, admin, register) share one ALB — cheaper, one IP
    alb.ingress.kubernetes.io/group.name: oae
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
spec:
  rules:
    - host: api.example.com   # replaced in overlay
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oae-server
                port:
                  number: 80
