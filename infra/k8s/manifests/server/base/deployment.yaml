apiVersion: apps/v1
kind: Deployment
metadata:
  name: oae-server
  namespace: oae
  labels:
    app: oae-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oae-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: oae-server
    spec:
      serviceAccountName: oae-server
      terminationGracePeriodSeconds: 30
      containers:
        - name: server
          image: oae/server:latest   # replaced by CI with ECR URL + SHA tag
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: oae-server-config
            - secretRef:
                name: oae-server-secrets
          env:
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: oae-server-config
                  key: S3_BUCKET_NAME
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: oae-server
                topologyKey: kubernetes.io/hostname
