apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: oae

resources:
  - ../../base

# Image tag is updated by CI (e.g. kustomize edit set image)
images:
  - name: oae/server
    newName: 957905179934.dkr.ecr.ap-south-1.amazonaws.com/oae/server
    newTag: latest

patches:
  - path: serviceaccount-patch.yaml
    target:
      kind: ServiceAccount
      name: oae-server
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: oae-server
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: oae-server-config
