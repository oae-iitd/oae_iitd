apiVersion: apps/v1
kind: Deployment
metadata:
  name: oae-register
  namespace: oae
  labels:
    app: oae-register
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oae-register
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: oae-register
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: register
          image: oae/register-client:latest   # replaced by CI with ECR URL + SHA tag
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: oae-register
                topologyKey: kubernetes.io/hostname
