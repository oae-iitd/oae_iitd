apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oae-register
  namespace: oae
  annotations:
    # Get from: terraform output acm_certificate_arn
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:ACCOUNT_ID:certificate/CERTIFICATE_ID
spec:
  rules:
    - host: register.anyserver.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oae-register
                port:
                  number: 80
