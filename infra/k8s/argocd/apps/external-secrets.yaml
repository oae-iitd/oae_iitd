apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.10.*"
    helm:
      values: |
        serviceAccount:
          name: external-secrets-sa
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::957905179934:role/oae-production-external-secrets
        webhook:
          serviceAccount:
            name: external-secrets-sa
        certController:
          serviceAccount:
            name: external-secrets-sa
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
