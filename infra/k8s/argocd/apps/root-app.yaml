# App-of-Apps: ArgoCD watches this directory and manages all child apps.
# Apply this manually once after ArgoCD is installed:
#   kubectl apply -f infra/k8s/argocd/apps/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/oae-iitd/oae_iitd.git
    targetRevision: main
    path: infra/k8s/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
