apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oae-admin
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/oae-iitd/oae_iitd.git  # replace
    targetRevision: main
    path: infra/k8s/manifests/admin/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: oae
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
