name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Server: unit + integration tests ───────────────────────────────────────
  test-server:
    name: Test · Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oae_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: server/go.sum

      - run: go mod download

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/oae_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
        run: make test-integration

  # ── Server: lint ────────────────────────────────────────────────────────────
  lint-server:
    name: Lint · Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: server
          args: --timeout=5m

  # ── Admin: lint + unit tests ────────────────────────────────────────────────
  test-admin:
    name: Test · Admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin_client/package-lock.json

      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:coverage

  # ── Admin: Playwright E2E ────────────────────────────────────────────────────
  e2e-admin:
    name: E2E · Admin
    runs-on: ubuntu-latest
    needs: test-admin
    defaults:
      run:
        working-directory: admin_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin_client/package-lock.json

      - run: npm ci
      - run: npm run test:e2e:install
      - run: npm run test:e2e

  # ── Register: lint + build check ────────────────────────────────────────────
  test-register:
    name: Test · Register
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: register_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: register_client/package-lock.json

      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build check
        run: npm run build

  # ── Build all images → Docker Hub → Deploy all to EC2 ──────────────────────
  # Runs only on main push, after every test job passes.
  deploy:
    name: Build & Deploy · All Services
    runs-on: ubuntu-latest
    needs: [test-server, lint-server, test-admin, e2e-admin, test-register]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build all three images in parallel
      - name: Build & push · server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-server:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-server:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-server:cache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-server:cache,mode=max

      - name: Build & push · admin
        uses: docker/build-push-action@v6
        with:
          context: ./admin_client
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-admin:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-admin:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-admin:cache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-admin:cache,mode=max

      - name: Build & push · register
        uses: docker/build-push-action@v6
        with:
          context: ./register_client
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-register:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-register:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-register:cache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-register:cache,mode=max

      - name: Deploy all to EC2
        uses: appleboy/ssh-action@v1
        env:
          SERVER_ENV:         ${{ secrets.SERVER_ENV }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG:                ${{ github.sha }}
          REPO:               ${{ github.repository }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs:     SERVER_ENV,DOCKERHUB_USERNAME,TAG,REPO
          script: |
            set -e

            # Clone repo on first run, pull on subsequent runs
            if [ ! -d /opt/oae/.git ]; then
              sudo mkdir -p /opt/oae
              sudo chown $USER:$USER /opt/oae
              git clone https://github.com/${REPO}.git /opt/oae
            else
              git -C /opt/oae fetch origin main
              git -C /opt/oae reset --hard origin/main
            fi

            cd /opt/oae

            # Write .env for docker compose image names
            printf 'DOCKERHUB_USERNAME=%s\nTAG=%s\n' "$DOCKERHUB_USERNAME" "$TAG" > .env

            # Write server runtime secrets
            printf '%s\n' "$SERVER_ENV" > .env.server

            # Free ports 80/443 if a system web server is running
            sudo systemctl stop nginx apache2 2>/dev/null || true
            sudo systemctl disable nginx apache2 2>/dev/null || true

            # Pull new images and restart all services
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
