name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Server: unit + integration tests ───────────────────────────────────────
  test-server:
    name: Test · Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oae_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: server/go.sum

      - run: go mod download

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/oae_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
        run: make test-integration

  # ── Server: lint ────────────────────────────────────────────────────────────
  lint-server:
    name: Lint · Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: server
          args: --timeout=5m

  # ── Admin: lint + unit tests ────────────────────────────────────────────────
  test-admin:
    name: Test · Admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin_client/package-lock.json

      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:coverage

  # ── Admin: Playwright E2E ────────────────────────────────────────────────────
  e2e-admin:
    name: E2E · Admin
    runs-on: ubuntu-latest
    needs: test-admin
    defaults:
      run:
        working-directory: admin_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin_client/package-lock.json

      - run: npm ci
      - run: npm run test:e2e:install
      - run: npm run test:e2e

  # ── Register: lint + build check ────────────────────────────────────────────
  test-register:
    name: Test · Register
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: register_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: register_client/package-lock.json

      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build check
        run: npm run build

  # ── Build all images → Docker Hub → Deploy all to EC2 ──────────────────────
  # Runs only on main push, after every test job passes.
  deploy:
    name: Build & Deploy · All Services
    runs-on: ubuntu-latest
    needs: [test-server, lint-server, test-admin, e2e-admin, test-register]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build all three images in parallel
      - name: Build & push · server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-server:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-server:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-server:cache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-server:cache,mode=max

      - name: Build & push · admin
        uses: docker/build-push-action@v6
        with:
          context: ./admin_client
          platforms: linux/amd64
          push: true
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-admin:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-admin:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-admin:cache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-admin:cache,mode=max

      - name: Build & push · register
        uses: docker/build-push-action@v6
        with:
          context: ./register_client
          platforms: linux/amd64
          push: true
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-register:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/oae-register:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-register:cache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/oae-register:cache,mode=max

      - name: Decode SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > /tmp/ec2_key
          chmod 600 /tmp/ec2_key

      - name: Deploy all to EC2
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: /tmp/ec2_key
          script: |
            export TAG=${{ github.sha }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            bash /opt/oae/scripts/deploy.sh all
