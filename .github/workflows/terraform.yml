name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'

env:
  AWS_REGION: ap-south-1

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Plan & Apply
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: infra/terraform/environments/production

    env:
      # Injected from GitHub Secrets — never written to disk
      TF_VAR_redis_auth_token: ${{ secrets.TF_VAR_REDIS_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Clear stale state lock
        run: |
          aws dynamodb delete-item \
            --table-name oae-tf-locks \
            --key '{"LockID": {"S": "oae-tf-state-957905179934/production/terraform.tfstate"}}' \
            --region ${{ env.AWS_REGION }} || true

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Recover errored state (if any)
        run: |
          if [ -f errored.tfstate ]; then
            terraform state push errored.tfstate
            rm errored.tfstate
          fi

      - name: Import existing OIDC provider (idempotent)
        run: |
          terraform import aws_iam_openid_connect_provider.github \
            arn:aws:iam::957905179934:oidc-provider/token.actions.githubusercontent.com || true

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -input=false tfplan
