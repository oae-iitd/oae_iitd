name: Admin Client

on:
  push:
    branches: [main, develop]
    paths:
      - 'admin_client/**'
      - '.github/workflows/admin.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'admin_client/**'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: oae/admin-client
  K8S_OVERLAY: infra/k8s/manifests/admin/overlays/production

defaults:
  run:
    working-directory: admin_client

jobs:
  # ── 1. Lint + Unit tests ───────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin_client/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:coverage

  # ── 2. E2E (Playwright) ────────────────────────────────────────────────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: test
    # Skip E2E on tag pushes to keep releases fast
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin_client/package-lock.json

      - run: npm ci
      - run: npm run test:e2e:install
      - run: npm run test:e2e

  # ── 3. Build → ECR → GitOps (main only) ───────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: gitops-deploy
      cancel-in-progress: false
    defaults:
      run:
        working-directory: .

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          docker build \
            --platform linux/amd64 \
            --cache-from "${REGISTRY}/${ECR_REPOSITORY}:cache" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t "${IMAGE}" \
            -t "${REGISTRY}/${ECR_REPOSITORY}:cache" \
            ./admin_client
          docker push "${IMAGE}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:cache"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Update K8s manifest (GitOps)
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in manifest
        run: |
          cd ${{ env.K8S_OVERLAY }}
          kustomize edit set image oae/admin-client="${{ steps.build.outputs.image }}"

      - name: Commit & push manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.K8S_OVERLAY }}/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "chore: deploy admin ${GITHUB_SHA::7} [skip ci]"
          git pull --rebase origin main
          git push
