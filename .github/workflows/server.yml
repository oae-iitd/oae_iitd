name: Server

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/server.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'server/**'

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: oae/server
  K8S_OVERLAY: infra/k8s/manifests/server/overlays/production

defaults:
  run:
    working-directory: server

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oae_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: server/go.sum

      - run: go mod download

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/oae_test?sslmode=disable
          TEST_REDIS_ADDR: localhost:6379
        run: make test-integration

  # ── 2. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          working-directory: server

  # ── 3. Build → ECR → GitOps (main only) ───────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: gitops-deploy
      cancel-in-progress: false
    # Override workflow-level working-directory — deploy job runs from repo root
    defaults:
      run:
        working-directory: .

    permissions:
      id-token: write   # OIDC → AWS
      contents: write   # push manifest update

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          docker build \
            --platform linux/amd64 \
            --cache-from "${REGISTRY}/${ECR_REPOSITORY}:cache" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "${IMAGE}" \
            -t "${REGISTRY}/${ECR_REPOSITORY}:cache" \
            ./server
          docker push "${IMAGE}"
          docker push "${REGISTRY}/${ECR_REPOSITORY}:cache"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Update K8s manifest (GitOps)
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in manifest
        run: |
          cd ${{ env.K8S_OVERLAY }}
          kustomize edit set image oae/server="${{ steps.build.outputs.image }}"

      - name: Commit & push manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.K8S_OVERLAY }}/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "chore: deploy server ${GITHUB_SHA::7} [skip ci]"
          git pull --rebase origin main
          git push
